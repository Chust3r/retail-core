services:
   postgres:
      image: postgres:16
      container_name: retailcore_db

      environment:
         POSTGRES_USER: ${POSTGRES_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
         POSTGRES_DB: ${POSTGRES_DB:-retailcore}
         POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
         TZ: ${TZ}

      ports:
         - '5432:5432'

      volumes:
         - pgdata:/var/lib/postgresql/data

         - ../database/schema:/docker-entrypoint-initdb.d/01_schema
         - ../database/seed:/docker-entrypoint-initdb.d/02_seed

         - ../data:/data

      restart: unless-stopped

      healthcheck:
         test:
            [
               'CMD-SHELL',
               'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-retailcore}',
            ]
         interval: 10s
         timeout: 5s
         retries: 5

      networks:
         - postgres_network

   pgadmin:
      image: dpage/pgadmin4:latest
      container_name: retailcore_pgadmin

      environment:
         PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
         PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
         PGADMIN_CONFIG_SERVER_MODE: 'False'
         TZ: ${TZ}

      ports:
         - '8080:80'

      volumes:
         - pgadmin_data:/var/lib/pgadmin

         - ../data:/tmp

      restart: unless-stopped

      depends_on:
         postgres:
            condition: service_healthy

      networks:
         - postgres_network

networks:
   postgres_network:
      driver: bridge

volumes:
   pgdata:
   pgadmin_data:
